<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>lol</title>
  <style>
    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    #text {
      font-size: 72px;
      font-weight: bold;
      font-family: Arial, sans-serif;
      letter-spacing: 4px;
      text-align: center;
    }

    span {
      display: inline-block;
      animation: rainbow 1.5s linear infinite;
    }

    @keyframes rainbow {
      0%   { color: red; }
      14%  { color: orange; }
      28%  { color: yellow; }
      42%  { color: lime; }
      57%  { color: dodgerblue; }
      71%  { color: blue; }
      85%  { color: violet; }
      100% { color: red; }
    }
  </style>
</head>
<body>
  <div id="text"></div>

  <script>
    const msg = "good boy";
    const div = document.getElementById("text");
    for (let i = 0; i < msg.length; i++) {
      const s = document.createElement("span");
      s.textContent = msg[i] === " " ? "\u00A0" : msg[i];
      s.style.animationDelay = `${(i / msg.length) * -1.5}s`;
      div.appendChild(s);
    }
  </script>
</body>
</html>
